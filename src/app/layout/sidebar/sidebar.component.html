<div class="h-full flex flex-column surface-card border-right-1 surface-border">
    <div class="flex align-items-center justify-content-center pt-4 pb-2 px-3">
        <span class="text-2xl font-bold text-primary">AI Street</span>
    </div>
    <div class="flex-grow-1 overflow-y-auto">
        <p-menu [model]="items" styleClass="w-full border-none opacity-90"></p-menu>
    </div>
    <div class="p-3 mt-auto border-top-1 surface-border">
        <div class="flex align-items-center gap-2 p-2 border-round hover:surface-hover cursor-pointer transition-duration-150 transition-colors">
            <p-avatar label="U" shape="circle" styleClass="bg-primary text-white"></p-avatar>
            <div class="flex flex-column">
                <span class="font-bold">User</span>
                <span class="text-sm text-500">Admin</span>
            </div>
        </div>
    </div>
</div>
