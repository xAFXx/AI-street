<div class="h-full flex flex-column surface-card border-right-1 surface-border">
    <div class="flex align-items-center justify-content-center pt-4 pb-2 px-3">
        <span class="text-2xl font-bold text-primary">AI Street</span>
    </div>
    <div class="flex-grow-1 overflow-y-auto">
        <p-menu [model]="items" styleClass="w-full border-none opacity-90"></p-menu>
    </div>
    <div class="p-3 mt-auto border-top-1 surface-border">
        <!-- Role Toggle Button -->
        <div class="mb-2">
            <button pButton [label]="getRoleLabel()"
                [icon]="currentUser?.role === 'admin' ? 'pi pi-shield' : 'pi pi-user'"
                class="w-full p-button-outlined p-button-sm" [class.p-button-success]="currentUser?.role === 'admin'"
                [class.p-button-secondary]="currentUser?.role === 'enduser'" (click)="toggleRole()"
                pTooltip="Click to switch role">
            </button>
        </div>
        <!-- Clear Data Button (Admin only) -->
        <div class="mb-2" *ngIf="currentUser?.role === 'admin'">
            <button pButton label="Clear Data" icon="pi pi-trash"
                class="w-full p-button-outlined p-button-danger p-button-sm" (click)="clearAllData()"
                pTooltip="Clear localStorage and reload (for testing)">
            </button>
        </div>
        <!-- User Info -->
        <div
            class="flex align-items-center gap-2 p-2 border-round hover:surface-hover cursor-pointer transition-duration-150 transition-colors">
            <p-avatar [label]="currentUser?.role === 'admin' ? 'A' : 'U'" shape="circle"
                [styleClass]="currentUser?.role === 'admin' ? 'bg-green-500 text-white' : 'bg-primary text-white'">
            </p-avatar>
            <div class="flex flex-column">
                <span class="font-bold">{{ currentUser?.name || 'User' }}</span>
                <span class="text-sm text-500">{{ getRoleLabel() }}</span>
            </div>
        </div>
    </div>
</div>
